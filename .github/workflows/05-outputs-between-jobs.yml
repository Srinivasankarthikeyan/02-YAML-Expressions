name: 05 Outputs Between Jobs
# Passing data from one job to another.

on: push

jobs:
  generator:
    runs-on: ubuntu-latest
    # Map the step output to a job output
    outputs:
      artifact-name: ${{ steps.set-output.outputs.NAME }}
    steps:
      - id: set-output
        run: echo "NAME=my-cool-artifact" >> $GITHUB_OUTPUT

  consumer:
    runs-on: ubuntu-latest
    needs: generator
    steps:
      - name: Use the output
        run: echo "Received artifact name: ${{ needs.generator.outputs.artifact-name }}"

# Exam Notes:
# 1. Set output in step: echo "key=value" >> $GITHUB_OUTPUT
# 2. Map step output to job output in 'outputs' section.
# 3. Access in dependent job using: needs.<job-id>.outputs.<output-name>
